<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blind Bite - Cek Side Dish</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #fdf2e9; margin: 0; }
        .container { background: white; padding: 2.5rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 350px; border: 2px solid #e67e22; }
        h2 { color: #d35400; margin-bottom: 5px; }
        .brand { font-weight: bold; color: #e67e22; letter-spacing: 1px; margin-bottom: 20px; display: block; }
        input { width: 90%; padding: 12px; margin: 15px 0; border: 2px solid #fed7aa; border-radius: 8px; font-size: 1.2rem; text-align: center; text-transform: lowercase; outline: none; }
        input:focus { border-color: #e67e22; }
        button { background: #e67e22; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; width: 100%; transition: 0.3s; }
        button:hover { background: #d35400; transform: scale(1.02); }
        #result { margin-top: 25px; min-height: 80px; transition: all 0.5s ease; }
        .side-dish-text { font-size: 1.8rem; font-weight: bold; display: block; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🍔 Blind Bite</h2>
    <span class="brand">BURGER & SURPRISE</span>
    
    <p>Masukkan 6 digit kuponmu:</p>
    <input type="text" id="couponInput" placeholder="abc123" maxlength="6">
    <br>
    <button onclick="revealSideDish()">CEK HADIAH!</button>
    
    <div id="result"></div>
</div>

<script>
    function revealSideDish() {
        const input = document.getElementById('couponInput');
        const coupon = input.value.toLowerCase().trim();
        const resultDiv = document.getElementById('result');

        // Validasi input
        if (coupon.length !== 6) {
            resultDiv.innerHTML = "<span style='color: red;'>⚠️ Masukkan 6 digit kode!</span>";
            return;
        }

        try {
            // 1. Hashing
            const hash = CryptoJS.SHA256(coupon).toString();
            const hashInt = parseInt(hash.substring(0, 8), 16);
            const score = hashInt % 100;

            let sideDish = "";
            let emoji = "";
            let color = "";

            // 2. Logika Deterministik
            if (score < 60) {
                sideDish = "Kentang Goreng";
                emoji = "🍟";
                color = "#f1c40f";
            } else if (score < 90) {
                sideDish = "Chicken Nugget";
                emoji = "🍗";
                color = "#e67e22";
            } else {
                sideDish = "Onion Rings";
                emoji = "🧅";
                color = "#9b59b6";
            }

            // 3. Tampilan Hasil
            resultDiv.style.opacity = 0;
            setTimeout(() => {
                resultDiv.innerHTML = `
                    <span style="color: #7f8c8d; font-size: 0.9rem;">Kamu mendapatkan:</span><br>
                    <span class="side-dish-text" style="color: ${color};">${emoji} ${sideDish}</span>
                `;
                resultDiv.style.opacity = 1;

                // 4. Efek Confetti
                confetti({
                    particleCount: 100,
                    spread: 70,
                    origin: { y: 0.6 },
                    colors: [color, '#ffffff', '#e67e22']
                });
            }, 100);

        } catch (e) {
            console.error(e);
            resultDiv.innerText = "Terjadi kesalahan sistem.";
        }
    }
</script>

</body>
</html>
