<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blind Bite - Cek Side Dish</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        /* Menggunakan warna dari poster: Merah Tua (#800000) dan Cream (#FDF1DA) */
        body { 
            font-family: 'Montserrat', 'Segoe UI', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background-color: #710000; /* Latar Belakang Merah Tua Gelap seperti poster */
            margin: 0; 
            color: #FDF1DA; /* Teks Utama Cream */
        }
        
        .container { 
            background: rgba(0,0,0,0.4); /* Kotak transparan agar merah tua tetap terlihat */
            padding: 3rem 2.5rem; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            text-align: center; 
            width: 360px; 
            border: 3px solid #FDF1DA; /* Border Cream seperti tulisan "25K" */
        }
        
        h1 { 
            color: #FDF1DA; /* Warna Cream untuk Judul */
            font-size: 2.8rem;
            margin: 0;
            letter-spacing: -1px;
            font-weight: 800;
        }

        .brand-handle {
            display: block;
            margin-top: -5px;
            margin-bottom: 25px;
            font-size: 1rem;
            color: rgba(253, 241, 218, 0.7);
        }

        p {
            font-size: 1.1rem;
            margin-bottom: 15px;
        }
        
        input { 
            width: 85%; 
            padding: 15px; 
            margin: 10px 0; 
            border: 2px solid #FDF1DA; 
            border-radius: 10px; 
            font-size: 1.4rem; 
            text-align: center; 
            background-color: transparent;
            color: #FDF1DA;
            text-transform: lowercase; 
            outline: none; 
        }
        
        input::placeholder {
            color: rgba(253, 241, 218, 0.4);
        }

        input:focus { 
            box-shadow: 0 0 15px rgba(253, 241, 218, 0.5);
        }
        
        button { 
            background: #FDF1DA; /* Tombol Cream */
            color: #710000; /* Teks di tombol Merah Tua */
            border: none; 
            padding: 15px 30px; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: 800; 
            font-size: 1.1rem; 
            width: 100%; 
            transition: all 0.3s ease; 
            letter-spacing: 1px;
        }
        
        button:hover { 
            transform: scale(1.03); 
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        #result { 
            margin-top: 30px; 
            min-height: 120px; 
            transition: all 0.5s ease; 
        }

        /* Styling untuk gambar side dish agar pas di kotak */
        .side-dish-img {
            max-width: 150px;
            margin-top: 15px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }
        
        .side-dish-text { 
            font-size: 2rem; 
            font-weight: bold; 
            color: #FDF1DA;
            display: block; 
            margin-top: 10px; 
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🍔 Blind Bite 🍔</h1>
    <span class="brand-handle">@blind.bite</span>
    
    <p>Masukkan 6 digit kuponmu\nuntuk membuka blind boxnya!</p>
    <input type="text" id="couponInput" placeholder="xxxxxx" maxlength="6">
    <br>
    <button onclick="revealSideDish()">BUKA KOTAK!</button>
    
    <div id="result"></div>
</div>

<script>
    // PENTING: Untuk sementara, aku pakai gambar placeholder.
    // Nanti kamu bisa potong (crop) gambar dari poster kamu dan upload ke GitHub-mu,
    // lalu ganti link-nya di bawah.
    const imagePlaceholder = {
        fries: 'https://cdn.discordapp.com/attachments/972120654642028584/1496483976066371644/tasty-french-fries-white-background-image_1038691-4617-removebg-preview.png?ex=69ea0ccf&is=69e8bb4f&hm=ab5fdd21b80569210bdba1bce612927c5263c654687eb09cc470dc1de9efbc13&',
        nuggets: 'https://cdn.discordapp.com/attachments/972120654642028584/1496484433698750516/images-removebg-preview.png?ex=69ea0d3c&is=69e8bbbc&hm=b8b41ebde2bca08ca8ea9fc5da1fc61ec8e5d45648ded7f55f5570d43b9c9db7&',
        rings: 'https://cdn.discordapp.com/attachments/972120654642028584/1496484690717315122/images-removebg-preview1.png?ex=69ea0d79&is=69e8bbf9&hm=52eda14cd2ab0bb061aecaea4a9ebff2a061007dbb53fb3c400360954bdd2c4f&'
    };

    function revealSideDish() {
        const input = document.getElementById('couponInput');
        const coupon = input.value.toLowerCase().trim();
        const resultDiv = document.getElementById('result');

        // Validasi input
        if (coupon.length !== 6) {
            resultDiv.innerHTML = "<span style='color: #FDF1DA; background: #900; padding: 5px; border-radius:5px;'>⚠️ Masukkan 6 digit kode!</span>";
            return;
        }

        try {
            // 1. Hashing
            const hash = CryptoJS.SHA256(coupon).toString();
            const hashInt = parseInt(hash.substring(0, 8), 16);
            const score = hashInt % 100;

            let sideDishName = "";
            let sideDishImg = "";

            // 2. Logika Deterministik (Sesuai probabilitas)
            if (score < 60) {
                sideDishName = "French Fries";
                sideDishImg = imagePlaceholder.fries; // Ganti dengan link gambar aslimu
            } else if (score < 90) {
                sideDishName = "Nuggets";
                sideDishImg = imagePlaceholder.nuggets; // Ganti dengan link gambar aslimu
            } else {
                sideDishName = "Onion Rings";
                sideDishImg = imagePlaceholder.rings; // Ganti dengan link gambar aslimu
            }

            // 3. Tampilan Hasil (Sedikit delay agar kejutan)
            resultDiv.style.opacity = 0;
            setTimeout(() => {
                resultDiv.innerHTML = `
                    <span style="color: rgba(253, 241, 218, 0.7); font-size: 1rem;">Yey! Kamu dapat side dish:</span><br>
                    <img src="${sideDishImg}" alt="${sideDishName}" class="side-dish-img">
                    <span class="side-dish-text">${sideDishName}</span>
                `;
                resultDiv.style.opacity = 1;

                // 4. Efek Confetti (Warna Cream & Merah)
                confetti({
                    particleCount: 120,
                    spread: 80,
                    origin: { y: 0.6 },
                    colors: ['#FDF1DA', '#710000', '#ffffff']
                });
            }, 150);

        } catch (e) {
            console.error(e);
            resultDiv.innerText = "Terjadi kesalahan sistem.";
        }
    }
</script>

</body>
</html>
